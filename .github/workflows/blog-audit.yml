name: M365 Copilot Blog — Holistic Audit

on:
  schedule:
    # 06:15 UTC daily (~ 14:15 SGT / MYT, 13:15 WIB)
    - cron: '15 6 * * *'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply proposed banner additions and update state file (open PR)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blog-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl python-docx
        continue-on-error: true

      - name: Determine apply flag
        id: applyflag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.apply }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run blog audit (dry run)
        if: steps.applyflag.outputs.value != 'true'
        run: python tools/blog_audit.py

      - name: Run blog audit (apply)
        if: steps.applyflag.outputs.value == 'true'
        id: apply
        run: |
          python tools/blog_audit.py --apply
          if git diff --quiet -- build_master.py tools/blog_audit_state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run feasibility check
        id: feas
        if: always()
        run: |
          set +e
          python tools/feasibility_check.py | tee tools/proposals/_latest_feasibility.md
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Rebuild data.js + hub.html
        if: steps.apply.outputs.changed == 'true'
        run: |
          python build_master.py
          python gen_hub.py

      - name: Create Pull Request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: blog-audit/auto
          base: main
          delete-branch: true
          draft: true
          title: 'chore(blog-audit): proposed M365 Copilot hub updates'
          commit-message: |
            chore(blog-audit): proposed M365 Copilot hub updates

            Auto-generated by .github/workflows/blog-audit.yml.
            Review proposals/<run-id>/report.md and the WHATS_NEW additions
            before merging. Update prompt descriptions / sample files /
            license rules as needed for the new features.

            Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
          body: |
            Automated holistic audit of the Microsoft 365 Copilot blog.

            This PR contains:
            - New WHATS_NEW banner entry(ies) in `build_master.py`.
            - Updated `tools/blog_audit_state.json`.
            - Rebuilt `data.js` and `hub.html`.
            - Proposal report under `tools/proposals/<run-id>/report.md`.

            Please review:
            1. Banner copy in `build_master.py` (rephrase if you want a different tone).
            2. Feasibility report — does any tool description, prompt, or sample file need to mention the new capability, or remove a deprecated one?
            3. License rules — does the new feature change the FREE / M365 / FRONTIER tiering?

            **Do NOT merge without human review.** Marked as draft on purpose.

      - name: Upload proposals as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blog-audit-proposals
          path: tools/proposals/
          if-no-files-found: ignore
